<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breaking Right News</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f1b2d;
      }
      iframe {
        border: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .fallback {
        display: none;
        color: #e6ecf3;
        font-family: Georgia, "Times New Roman", serif;
        text-align: center;
        padding: 3rem 1.2rem;
      }
      .fallback a {
        color: #e0ad2b;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <iframe
      id="appFrame"
      title="Breaking Right News"
      src="https://visual-tribute-scsi-hist.trycloudflare.com/"
      allow="clipboard-write"
    ></iframe>
    <main class="fallback" id="fallback">
      <p>The live feed could not be embedded.</p>
      <p>
        <a id="fallbackLink" href="https://visual-tribute-scsi-hist.trycloudflare.com/">
          Open Breaking Right News
        </a>
      </p>
    </main>
    <script>
      // Keep this US GitHub Pages URL in the address bar while loading the live app.
      const frame = document.getElementById("appFrame");
      const fallback = document.getElementById("fallback");
      frame.addEventListener("error", () => {
        frame.style.display = "none";
        fallback.style.display = "block";
      });
    </script>
  </body>
</html>
